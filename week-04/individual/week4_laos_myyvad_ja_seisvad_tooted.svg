<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Laos olevad müüvad ja seisvad tooted kategooriate lõikes</title>
  <desc id="desc">Grupeeritud tulpdiagramm, mis võrdleb kategooriate lõikes laos olevaid tooteid, millel on 2025. aastal müük, ja tooteid, millel müük puudub.</desc>
  <rect width="1100" height="620" fill="#ffffff"/>

  <text x="70" y="48" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#202124">Laos olevad müüvad ja seisvad tooted</text>
  <text x="70" y="76" font-family="Arial, sans-serif" font-size="15" fill="#5f6368">Seisev toode = laos on jääk olemas, kuid alates 2025-01-01 müük puudub</text>

  <rect x="70" y="104" width="18" height="18" fill="#2f80ed"/>
  <text x="98" y="118" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">Müüvad tooted</text>
  <rect x="240" y="104" width="18" height="18" fill="#d64545"/>
  <text x="268" y="118" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">Seisvad tooted</text>

  <line x1="120" y1="520" x2="980" y2="520" stroke="#9aa0a6" stroke-width="1.5"/>
  <line x1="120" y1="150" x2="120" y2="520" stroke="#9aa0a6" stroke-width="1.5"/>
  <line x1="120" y1="427.5" x2="980" y2="427.5" stroke="#e8eaed"/>
  <line x1="120" y1="335" x2="980" y2="335" stroke="#e8eaed"/>
  <line x1="120" y1="242.5" x2="980" y2="242.5" stroke="#e8eaed"/>
  <line x1="120" y1="150" x2="980" y2="150" stroke="#e8eaed"/>

  <text x="98" y="524" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">0</text>
  <text x="92" y="431" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">20</text>
  <text x="92" y="339" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">40</text>
  <text x="92" y="246" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">60</text>
  <text x="92" y="154" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">80</text>

  <rect x="150" y="191.625" width="52" height="328.375" fill="#2f80ed"/>
  <rect x="207" y="473.75" width="52" height="46.25" fill="#d64545"/>
  <text x="176" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#202124">71</text>
  <text x="233" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#202124">10</text>

  <rect x="320" y="224" width="52" height="296" fill="#2f80ed"/>
  <rect x="377" y="487.625" width="52" height="32.375" fill="#d64545"/>
  <text x="346" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#202124">64</text>
  <text x="403" y="479" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#202124">7</text>

  <rect x="490" y="233.25" width="52" height="286.75" fill="#2f80ed"/>
  <rect x="547" y="492.25" width="52" height="27.75" fill="#d64545"/>
  <text x="516" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#202124">62</text>
  <text x="573" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#202124">6</text>

  <rect x="660" y="242.5" width="52" height="277.5" fill="#2f80ed"/>
  <rect x="717" y="483" width="52" height="37" fill="#d64545"/>
  <text x="686" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#202124">60</text>
  <text x="743" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#202124">8</text>

  <rect x="830" y="270.25" width="52" height="249.75" fill="#2f80ed"/>
  <rect x="887" y="483" width="52" height="37" fill="#d64545"/>
  <text x="856" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#202124">54</text>
  <text x="913" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#202124">8</text>

  <text x="205" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">meeste riided</text>
  <text x="375" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">jalanõud</text>
  <text x="545" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">laste riided</text>
  <text x="715" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">naiste riided</text>
  <text x="885" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">aksessuaarid</text>

  <text x="70" y="604" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Kõige rohkem seisvaid tooteid on meeste riiete kategoorias; kokku on 39 toodet, millel on laojääk olemas, kuid 2025. aastal müük puudub.</text>
</svg>
